task: ssv2_text_edge_informed_temporal
dataset_name: ssv2_text
include: default.yaml
test_split: val
doc_to_visual: !function utils.doc_to_visual
doc_to_text: !function utils.close_ended_doc_to_text
doc_to_target: "answer"
process_results: !function utils.text_process_results
metric_list:
  - metric: accuracy
    aggregation: !function utils.text_aggregate
    higher_is_better: true

lmms_eval_specific_kwargs:
  prompt_style: "ssv2_text_edge_informed_temporal"

generation_kwargs:
  max_new_tokens: 512